<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahay — Shop Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root {
            --bg-void: #06070f;
            --bg-deep: #0a0c1a;
            --bg-dark: #0a0c1a;
            --bg-card: #0f1120;
            --bg-surface: #141729;
            --bg-raised: #1a1f35;

            --stripe-purple: #635bff;
            --stripe-purple-bright: #7c74ff;
            --stripe-violet: #7c3aed;
            --stripe-glow: rgba(99,91,255,0.18);

            --primary: #635bff;
            --primary-hover: #7c74ff;
            --primary-light: rgba(99,91,255,0.15);

            --text-main: #eef0ff;
            --text-secondary: #a8b0d8;
            --text-muted: #5a6080;
            --border: rgba(255,255,255,0.08);
            --border-accent: rgba(99,91,255,0.4);

            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
            --info: #06b6d4;

            --font: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-body);
            background: var(--bg-void);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(6,7,15,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            font-family: var(--font);
        }

        .brand-mark { width:44px; height:44px; display:flex; align-items:center; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-user {
            font-size: 14px;
            color: var(--text-muted);
        }
        .nav-user strong { color: var(--text-main); font-weight: 600; }

        .btn-logout {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.2s;
        }
        .btn-logout:hover {
            background: rgba(244,63,94,0.08);
            border-color: rgba(244,63,94,0.3);
            color: var(--error);
        }

        /* Tabs */
        .tab-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            gap: 32px;
        }

        .tab-item {
            padding: 20px 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            font-family: var(--font);
        }

        .tab-item:hover { color: var(--text-secondary); }
        .tab-item.active { color: var(--stripe-purple-bright); }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--stripe-purple), var(--stripe-violet));
            border-radius: 3px 3px 0 0;
            box-shadow: 0 -2px 12px rgba(99,91,255,0.5);
        }

        /* Main Content */
        .page { padding: 32px; max-width: 1400px; margin: 0 auto; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .section-header h2 { font-size: 20px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; }
        .section-header .line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

        /* Card & Table */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 32px;
        }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; min-width: 1200px; border-collapse: separate; border-spacing: 0; }
        thead th {
            padding: 16px; text-align: left; font-size: 11px; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
            background: var(--bg-dark); border-bottom: 1px solid var(--border);
        }
        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: rgba(99,91,255,0.04); }
        tbody td {
            padding: 16px; font-size: 13px; color: var(--text-main);
            border-bottom: 1px solid var(--border);
        }
        tbody tr:last-child td { border-bottom: none; }
        .strong-text { font-weight: 600; }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .bp { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .ba { background: rgba(59, 130, 246, 0.1); color: var(--info); border: 1px solid rgba(59, 130, 246, 0.2); }
        .bc { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
        .bp::before { background: var(--warning); animation: pulse-dot 1.5s infinite; }
        .ba::before { background: var(--info); }
        .bc::before { background: var(--success); }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* Action Buttons */
        .btn-action {
            background: transparent; padding: 6px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font);
            transition: all 0.2s; margin-right: 4px;
        }
        .btn-acc { background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet)); color: white; border: none; box-shadow: 0 2px 10px rgba(99,91,255,0.3); }
        .btn-acc:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,91,255,0.45); }
        .btn-rej { color: var(--error); border: 1px solid rgba(244,63,94,0.3); }
        .btn-rej:hover { background: rgba(244,63,94,0.08); }
        .btn-complete { background: var(--success); color: white; border: none; }
        .btn-complete:hover { background: #059669; }
        .btn-done { background: var(--border); color: var(--text-muted); border: none; cursor: default; }
        .btn-view-review { color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
        .btn-view-review:hover { background: rgba(168, 85, 247, 0.1); }
        .btn-view-img { color: var(--info); border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-view-img:hover { background: rgba(59, 130, 246, 0.1); }

        .stars-display { color: var(--warning); font-size: 14px; letter-spacing: 2px; }

        /* Form Profile Grid */
        .profile-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 32px;
        }
        .fg { margin-bottom: 20px; }
        .fg label {
            display: block; font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
        }
        .fg input, .fg select {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body);
            color: var(--text-main); background: var(--bg-void); outline: none;
            transition: all 0.2s;
        }
        .fg input:focus { border-color: var(--stripe-purple); box-shadow: 0 0 0 3px rgba(99,91,255,0.12); }

        /* Branch List */
        .branch-card {
            background: var(--bg-void); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 20px; margin-bottom: 16px; position: relative;
        }
        .branch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-remove-branch {
            position: absolute; top: 16px; right: 16px; background: none; border: none;
            color: var(--text-muted); cursor: pointer; font-size: 18px; transition: color 0.2s;
        }
        .btn-remove-branch:hover { color: var(--error); }
        
        .btn-add-branch {
            background: transparent; color: var(--stripe-purple-bright); border: 1px dashed rgba(99,91,255,0.4);
            padding: 10px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 8px; width: fit-content;
            transition: all 0.2s; font-family: var(--font);
        }
        .btn-add-branch:hover { background: rgba(99,91,255,0.1); border-color: rgba(99,91,255,0.6); }

        .btn-save-profile {
            background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet));
            color: white; border: none; padding: 14px 32px; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font);
            box-shadow: 0 4px 16px rgba(99,91,255,0.3);
            transition: all 0.2s; margin-left: 32px; margin-bottom: 32px;
        }
        .btn-save-profile:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,91,255,0.45); }

        /* Modals */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6,7,15,0.85); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: center; padding: 16px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.2s ease; }

        .modal-base {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,91,255,0.1);
            width: 100%; overflow: hidden;
        }
        .mechanic-popup { max-width: 500px; }
        .review-view-pop { max-width: 400px; text-align: center; padding-bottom: 24px; }
        .img-pop { max-width: 500px; }

        .modal-head {
            background: var(--bg-dark); padding: 20px 24px; display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
        }
        .modal-head h3 { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .btn-x {
            background: rgba(255, 255, 255, 0.05); border: none; color: var(--text-muted);
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px;
        }
        .btn-x:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .modal-body { padding: 24px; }

        .popup-field { margin-bottom: 16px; }
        .popup-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .popup-field input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg-void); color: var(--text-main); outline: none; transition: all 0.2s; }
        .popup-field input:focus { border-color: var(--stripe-purple); box-shadow: 0 0 0 3px rgba(99,91,255,0.12); }

        .map-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        #mechanicMap { height: 220px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
        #mLocDisplay { font-size: 13px; color: var(--success); font-weight: 500; min-height: 20px; margin-bottom: 20px; }

        .popup-actions { display: flex; gap: 12px; }
        .btn-cancel { flex: 1; padding: 12px; background: transparent; color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-confirm { flex: 2; padding: 12px; background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet)); color: white; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-family: var(--font); box-shadow: 0 4px 16px rgba(99,91,255,0.3); transition: all 0.2s; }
        .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,91,255,0.4); }

        /* Review Modal Specifics */
        .review-view-pop .modal-head { background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet)); border-bottom: none; }
        .review-view-pop .modal-head h3 { color: white; }
        .review-view-pop .btn-x { color: rgba(255,255,255,0.8); }
        .big-stars { font-size: 36px; color: var(--warning); letter-spacing: 4px; margin: 24px 0 8px; }
        .rating-label { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        .review-text { font-size: 14px; color: var(--text-main); line-height: 1.6; font-style: italic; background: var(--bg-void); border-radius: var(--radius-sm); margin: 0 24px; padding: 16px; border: 1px solid var(--border); }
        .btn-close-rv { margin-top: 24px; padding: 10px 32px; background: rgba(255,255,255,0.06); color: var(--text-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-close-rv:hover { background: rgba(99,91,255,0.15); border-color: var(--border-accent); color: var(--text-main); }

        @media(max-width: 768px) {
            .page { padding: 20px; }
            .navbar { padding: 0 20px; }
            .profile-grid { grid-template-columns: 1fr; padding: 20px; }
            .branch-grid { grid-template-columns: 1fr; }
            .btn-save-profile { margin-left: 20px; }
        }
    </style>
</head>

                    <input type="text" id="ownerName">
                </div>
                <div class="fg">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>
                <div class="fg">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
                <div class="fg" style="display:flex; gap:16px;">
                    <div style="flex:1">
                        <label>Opening Time</label>
                        <input type="time" id="openingTime">
                    </div>
                    <div style="flex:1">
                        <label>Closing Time</label>
                        <input type="time" id="closingTime">
                    </div>
                </div>
            </div>
            
            <div style="padding: 0 32px; margin-bottom: 24px;">
                <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; margin-bottom:16px;">Branch Locations</label>
                <div id="branchesList"></div>
                <button type="button" class="btn-add-branch" onclick="addBranch()">+ Add Branch</button>
            </div>
            
            <button class="btn-save-profile" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
</div>

<!-- Assign/Accept Mechanic Overlay -->
<div class="overlay" id="acceptOverlay">
    <div class="modal-base mechanic-popup">
        <div class="modal-head">
            <h3>Assign Mechanic</h3>
            <button class="btn-x" onclick="closePopup()">✕</button>
        </div>
        <div class="modal-body">
            <div class="popup-field">
                <label>Mechanic Name</label>
                <input type="text" id="mName" placeholder="e.g. Rahul Sharma">
            </div>
            <div class="popup-field">
                <label>Mechanic Phone</label>
                <input type="text" id="mPhone" placeholder="e.g. 9876543210">
            </div>
            <div class="popup-field">
                <label>Estimated Arrival Time</label>
                <input type="text" id="mETA" placeholder="e.g. 30 mins / 4:30 PM">
            </div>
            <p class="map-label">Click on map to set mechanic's starting location</p>
            <div id="mechanicMap"></div>
            <div id="mLocDisplay">No location selected.</div>
            <div class="popup-actions">
                <button class="btn-cancel" onclick="closePopup()">Cancel</button>
                <button class="btn-confirm" onclick="confirmAccept()">Confirm & Accept</button>
            </div>
        </div>
    </div>
</div>

<!-- View Review Overlay -->
<div class="overlay" id="reviewOverlay">
    <div class="modal-base review-view-pop">
        <div class="modal-head">
            <h3>Customer Review</h3>
            <button class="btn-x" onclick="closeReviewPopup()">✕</button>
        </div>
        <div class="big-stars" id="rvStars"></div>
        <p class="rating-label" id="rvLabel"></p>
        <div class="review-text" id="rvComment"></div>
        <button class="btn-close-rv" onclick="closeReviewPopup()">Close</button>
    </div>
</div>

<!-- Vehicle Image Overlay -->
<div class="overlay" id="imgOverlay">
    <div class="modal-base img-pop">
        <div class="modal-head">
            <h3>Vehicle Photo</h3>
            <button class="btn-x" onclick="document.getElementById('imgOverlay').classList.remove('show')">✕</button>
        </div>
        <div style="padding: 24px; text-align: center;">
            <img id="vehicleImgView" src="" style="width: 100%; max-height: 400px; object-fit: contain; border-radius: 8px;">
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const API = "http://localhost:8082";
const sUser = localStorage.getItem("shopUsername");
const sName = localStorage.getItem("shopName");
const role = localStorage.getItem("role");

if (!sUser || role !== "SHOP_OWNER") { alert("Access denied!"); window.location.href = "index.html"; }

document.getElementById("shopNameTxt").innerText = sName || sUser;
document.getElementById("shopUserDisplay").style.display = "inline";

let currentRequestId = null;
let mechanicLat = null;
let mechanicLng = null;
let mechanicMapInstance = null;
let mechanicMarker = null;
let allRequests = [];
const starLabels = ["", "Poor", "Fair", "Good", "Very Good", "Excellent"];

function switchShopTab(tabId) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    document.querySelector(`.tab-item[onclick="switchShopTab('${tabId}')"]`).classList.add('active');
    document.getElementById(tabId).classList.add('active');
    
    if (tabId === 'profTab') fetchProfile();
    else fetchShopRequests();
}

function showVehicleImage(id) {
    const req = allRequests.find(r => r.id == id);
    if (req && req.vehicleImage) {
        document.getElementById("vehicleImgView").src = req.vehicleImage;
        document.getElementById("imgOverlay").classList.add("show");
    }
}

function showReview(rating, comment) {
    let stars = '';
    for (let i = 1; i <= 5; i++) stars += i <= rating ? '★' : '☆';
    document.getElementById("rvStars").innerText = stars;
    document.getElementById("rvLabel").innerText = starLabels[rating] + " — " + rating + " out of 5";
    document.getElementById("rvComment").innerText = comment || "No comment provided.";
    document.getElementById("reviewOverlay").classList.add("show");
}

function closeReviewPopup() { document.getElementById("reviewOverlay").classList.remove("show"); }

function fetchShopRequests() {
    fetch(API + "/api/shop/requests/" + sUser)
    .then(r => r.json())
    .then(data => {
        allRequests = data;
        const tb = document.querySelector("#shopTable tbody");
        tb.innerHTML = "";
        
        if (!data.length) {
            tb.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--text-muted);padding:40px">No requests assigned to your shop.</td></tr>';
            return;
        }

        data.forEach(req => {
            let sc = "badge-pending";
            if (req.status === "Accepted") sc = "badge-accepted";
            else if (req.status === "Completed") sc = "badge-completed";

            let action = '';
            if (req.status === "Pending") {
                action = `<button class="btn-action btn-acc" onclick="openAcceptPopup(${req.id})">Accept</button>
                          <button class="btn-action btn-rej" onclick="rejectRequest(${req.id})">Reject</button>`;
            } else if (req.status === "Accepted") {
                action = `<button class="btn-action btn-complete" onclick="updateStatus(${req.id}, 'Completed')">Mark Complete</button>`;
            } else {
                action = `<button class="btn-action btn-done" disabled>Done</button>`;
            }

            const loc = req.latitude ? `${req.latitude.toFixed(4)}, ${req.longitude.toFixed(4)}` : 'N/A';
            const ist = formatIST(req.createdAt);

            let imageCol = '<span style="color:var(--border)">—</span>';
            if (req.vehicleImage) {
                imageCol = `<button class="btn-action btn-view-img" onclick="showVehicleImage(${req.id})">📷 View</button>`;
            }

            let reviewCol = '<span style="color:var(--border)">—</span>';
            if (req.reviewRating) {
                let stars = '';
                for (let i = 1; i <= 5; i++) stars += i <= req.reviewRating ? '★' : '☆';
                const safeComment = encodeURIComponent(req.reviewComment || '');
                reviewCol = `<div style="display:flex; align-items:center; gap:8px;">
                               <span class="stars-display">${stars}</span>
                               <button class="btn-action btn-view-review" onclick='showReview(${req.reviewRating}, decodeURIComponent("${safeComment}"))'>View</button>
                             </div>`;
            }

            tb.innerHTML += `<tr>
                <td style="color:var(--text-muted);font-size:12px;">#${req.id}</td>
                <td class="strong-text">${req.customerName}</td>
                <td>${req.phone || 'N/A'}</td>
                <td>${req.vehicleNumber}</td>
                <td>${req.issue}</td>
                <td style="color:var(--text-muted)">${loc}</td>
                <td><span class="badge ${sc}">${req.status}</span></td>
                <td style="color:var(--text-muted)">${ist}</td>
                <td>${imageCol}</td>
                <td>${reviewCol}</td>
                <td>${action}</td>
            </tr>`;
        });
    }).catch(e => console.error("Error fetching requests:", e));
}

function openAcceptPopup(requestId) {
    currentRequestId = requestId;
    mechanicLat = null; mechanicLng = null;
    document.getElementById("mName").value = "";
    document.getElementById("mPhone").value = "";
    document.getElementById("mETA").value = "";
    document.getElementById("mLocDisplay").innerText = "No location selected.";
    document.getElementById("acceptOverlay").classList.add("show");
    
    setTimeout(() => {
        if (mechanicMapInstance) { mechanicMapInstance.remove(); mechanicMapInstance = null; mechanicMarker = null; }
        mechanicMapInstance = L.map('mechanicMap').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mechanicMapInstance);
        
        mechanicMapInstance.on('click', function(e) {
            mechanicLat = e.latlng.lat; mechanicLng = e.latlng.lng;
            if (mechanicMarker) mechanicMapInstance.removeLayer(mechanicMarker);
            mechanicMarker = L.marker([mechanicLat, mechanicLng]).addTo(mechanicMapInstance).bindPopup("Mechanic Location").openPopup();
            document.getElementById("mLocDisplay").innerText = mechanicLat.toFixed(4) + ", " + mechanicLng.toFixed(4);
        });
    }, 100);
}

function closePopup() {
    document.getElementById("acceptOverlay").classList.remove("show");
    if (mechanicMapInstance) { mechanicMapInstance.remove(); mechanicMapInstance = null; }
    currentRequestId = null;
}

function confirmAccept() {
    const name = document.getElementById("mName").value.trim();
    const phone = document.getElementById("mPhone").value.trim();
    const eta = document.getElementById("mETA").value.trim();
    if (!name || !phone || !eta) { alert("Please fill in all mechanic details!"); return; }
    
    fetch(API + `/api/requests/${currentRequestId}/accept`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            mechanicName: name, mechanicPhone: phone, estimatedArrival: eta, 
            mechanicLatitude: mechanicLat ? String(mechanicLat) : "", 
            mechanicLongitude: mechanicLng ? String(mechanicLng) : "" 
        })
    })
    .then(res => { if (!res.ok) throw new Error(); return res.json(); })
    .then(() => { closePopup(); fetchShopRequests(); })
    .catch(() => alert("Failed to accept request."));
}

function rejectRequest(id) {
    if (!confirm("Are you sure you want to reject this request? It will be sent to another shop.")) return;
    fetch(API + `/api/shop/requests/${id}/reject`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: sUser })
    })
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(() => fetchShopRequests())
    .catch(() => alert("Failed to reject request."));
}

function updateStatus(id, status) {
    fetch(API + `/api/requests/${id}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
    })
    .then(res => { if (!res.ok) throw new Error(); return res.json(); })
    .then(() => fetchShopRequests())
    .catch(() => alert("Failed to update status."));
}

// ---- Shop Profile Logic ----
let branchesArr = [];

function fetchProfile() {
    fetch(API + "/api/shop/profile/" + sUser)
    .then(r => r.json())
    .then(data => {
        document.getElementById("shopId").value = data.username;
        document.getElementById("shopName").value = data.shopName;
        document.getElementById("ownerName").value = data.ownerName || '';
        document.getElementById("phone").value = data.phone || '';
        document.getElementById("email").value = data.email || '';
        document.getElementById("openingTime").value = data.openingTime || '';
        document.getElementById("closingTime").value = data.closingTime || '';
        
        branchesArr = [];
        if (data.branchesJson) {
            try {
                const parsed = JSON.parse(data.branchesJson);
                if (Array.isArray(parsed)) branchesArr = parsed;
            } catch(e) {}
        }
        renderBranches();
    })
    .catch(() => alert("Failed to load profile"));
}

function renderBranches() {
    const list = document.getElementById("branchesList");
    list.innerHTML = "";
    branchesArr.forEach((b, idx) => {
        const div = document.createElement("div");
        div.className = "branch-card";
        div.innerHTML = `
            <button type="button" class="btn-remove-branch" onclick="removeBranch(${idx})">✕</button>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600;">BRANCH ${idx + 1}</div>
            <div class="branch-grid">
                <div class="fg" style="margin-bottom:0"><label>Name</label><input type="text" id="bName_${idx}" value="${b.name || ''}"></div>
                <div class="fg" style="margin-bottom:0"><label>Address</label><input type="text" id="bAddr_${idx}" value="${b.address || ''}"></div>
                <div class="fg" style="margin-bottom:0"><label>Latitude</label><input type="number" step="any" id="bLat_${idx}" value="${b.lat || ''}"></div>
                <div class="fg" style="margin-bottom:0"><label>Longitude</label><input type="number" step="any" id="bLng_${idx}" value="${b.lng || ''}"></div>
            </div>
        `;
        list.appendChild(div);
    });
}

function addBranch() {
    saveBranchStates();
    branchesArr.push({ name: '', address: '', lat: '', lng: '' });
    renderBranches();
}

function removeBranch(idx) {
    saveBranchStates();
    branchesArr.splice(idx, 1);
    renderBranches();
}

function saveBranchStates() {
    branchesArr.forEach((b, idx) => {
        const n = document.getElementById(`bName_${idx}`);
        const a = document.getElementById(`bAddr_${idx}`);
        const lt = document.getElementById(`bLat_${idx}`);
        const lg = document.getElementById(`bLng_${idx}`);
        if(n) b.name = n.value;
        if(a) b.address = a.value;
        if(lt) b.lat = lt.value;
        if(lg) b.lng = lg.value;
    });
}

function saveProfile() {
    const ownerName = document.getElementById("ownerName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const openingTime = document.getElementById("openingTime").value;
    const closingTime = document.getElementById("closingTime").value;

    saveBranchStates();
    const cleanBranches = branchesArr.filter(b => b.name.trim() !== "");

    fetch(API + "/api/shop/profile/" + sUser, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            ownerName, phone, email, openingTime, closingTime,
            branchesJson: JSON.stringify(cleanBranches)
        })
    })
    .then(r => { if(r.ok) { alert("Profile saved!"); fetchProfile(); } else throw new Error(); })
    .catch(() => alert("Failed to save profile."));
}

function logout() { localStorage.clear(); window.location.href = "index.html"; }

fetchShopRequests();

function formatIST(dtStr) {
    const utc = new Date(dtStr + 'Z');
    const ist = new Date(utc.getTime() + 330 * 60000);
    const dd = String(ist.getUTCDate()).padStart(2,'0');
    const mm = String(ist.getUTCMonth()+1).padStart(2,'0');
    const yyyy = ist.getUTCFullYear();
    const hh = String(ist.getUTCHours()).padStart(2,'0');
    const min = String(ist.getUTCMinutes()).padStart(2,'0');
    return dd+'/'+mm+'/'+yyyy+', '+hh+':'+min;
}
</script>
</body>
</html>
