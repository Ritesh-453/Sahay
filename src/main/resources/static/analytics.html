<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahay — Analytics & Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg-void: #06070f;
            --bg-deep: #0a0c1a;
            --bg-dark: #0a0c1a;
            --bg-card: #0f1120;
            --bg-surface: #141729;
            --bg-raised: #1a1f35;

            --stripe-purple: #635bff;
            --stripe-purple-bright: #7c74ff;
            --stripe-violet: #7c3aed;
            --stripe-glow: rgba(99, 91, 255, 0.18);

            --primary: #635bff;
            --primary-hover: #7c74ff;
            --primary-light: rgba(99, 91, 255, 0.15);

            --text-main: #eef0ff;
            --text-secondary: #a8b0d8;
            --text-muted: #5a6080;
            --border: rgba(255,255,255,0.08);
            --border-accent: rgba(99, 91, 255, 0.4);

            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
            --info: #06b6d4;

            --font: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg-void);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            box-shadow: 4px 0 24px rgba(0,0,0,0.3);
        }

        .brand-area {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .brand-mark { width:44px; height:44px; display:flex; align-items:center; }

        .brand-text { font-family: Arial, sans-serif; font-weight: 900; font-size: 28px; color: #ff6600; letter-spacing: -0.5px; }

        .nav-links {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(99,91,255,0.2), rgba(124,58,237,0.15));
            color: var(--stripe-purple-bright);
            border: 1px solid rgba(99,91,255,0.25);
        }
        .nav-link:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text-main); }
        .nav-link-icon { font-size: 18px; }

        .nav-footer {
            padding: 24px 16px;
            border-top: 1px solid var(--border);
        }

        .btn-logout {
            width: 100%; display: flex; align-items: center; justify-content: center;
            gap: 8px; background: rgba(244, 63, 94, 0.08); color: var(--error);
            border: 1px solid rgba(244, 63, 94, 0.25); padding: 10px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: var(--font);
        }
        .btn-logout:hover { background: rgba(244, 63, 94, 0.15); border-color: rgba(244,63,94,0.4); }

        /* ── Main ── */
        .main-content { flex: 1; margin-left: 260px; padding: 32px; max-width: 1200px; }

        .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .section-header h2 { font-size: 20px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; font-family: var(--font); }

        /* ── Filter Bar ── */
        .filter-bar {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 20px; margin-bottom: 32px;
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }

        .filter-group { display: flex; align-items: center; gap: 12px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-family: var(--font); }
        .filter-group input {
            background: var(--bg-void); border: 1px solid var(--border); color: var(--text-main);
            padding: 10px 14px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; outline: none;
            color-scheme: dark; transition: all 0.2s;
        }
        .filter-group input:focus { border-color: var(--stripe-purple); box-shadow: 0 0 0 3px rgba(99,91,255,0.12); }

        .btn-filter {
            background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet)); color: white; border: none;
            padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; font-family: var(--font);
            box-shadow: 0 4px 16px rgba(99,91,255,0.3);
        }
        .btn-filter:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,91,255,0.4); }

        .btn-pdf {
            background: rgba(16, 185, 129, 0.08); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-left: auto; display: flex; align-items: center; gap: 8px;
            font-family: var(--font);
        }
        .btn-pdf:hover { background: rgba(16, 185, 129, 0.15); border-color: rgba(16,185,129,0.4); }

        /* ── Stats ── */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card {
            background: var(--bg-card); border-radius: var(--radius-md); padding: 24px;
            border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.25);
            transition: all 0.25s ease; position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--stripe-purple), transparent); opacity: 0.5;
        }
        .stat-card:hover { border-color: var(--border-accent); box-shadow: 0 6px 30px rgba(99,91,255,0.15); transform: translateY(-2px); }
        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-family: var(--font); }
        .stat-value { font-size: 32px; color: var(--text-main); font-weight: 700; line-height: 1; font-family: var(--font); }

        /* ── Charts ── */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .chart-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 24px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            transition: all 0.25s ease;
        }
        .chart-card:hover { border-color: var(--border-accent); box-shadow: 0 6px 30px rgba(99,91,255,0.12); }
        .chart-title { font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 20px; font-family: var(--font); }
        .chart-container { position: relative; height: 300px; width: 100%; }

        @media(max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .btn-pdf { margin-left: 0; }
        }
    </style>
</head>

<main class="main-content">
    <div class="section-header">

    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Start Date</label>

        </div>
        <div class="filter-group">

        <button class="btn-pdf" onclick="generatePDF()">📄 Download PDF Report</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label"><span style="color:#818cf8; font-size:16px">📋</span> Total Requests</div>
            <div class="stat-value" id="sTotal">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span style="color:#fbbf24; font-size:16px">⏳</span> Pending</div>
            <div class="stat-value" id="sPending">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span style="color:#60a5fa; font-size:16px">🔧</span> Accepted</div>
            <div class="stat-value" id="sAccepted">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span style="color:#34d399; font-size:16px">✅</span> Completed</div>

        </div>
    </div>

        <div class="chart-card">
            <div class="chart-title">Requests by Status</div>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Breakdown by Issue Type</div>
            <div class="chart-container">
                <canvas id="issueChart"></canvas>
            </div>
        </div>
    </div>
</main>

<script>
const API = "https://sahay-n69u.onrender.com";
const role = localStorage.getItem("role");
if (!role || role !== "ADMIN") { alert("Access denied!"); window.location.href = "index.html"; }

// Set Chart defaults for Dark Theme
Chart.defaults.color = '#a8b0d8';
Chart.defaults.font.family = "'DM Sans', sans-serif";

let allReqs = [];
let statusChart = null;
let issueChart = null;

const colors = {
    warning: '#f59e0b',
    info: '#3b82f6',
    success: '#10b981',
    primary: '#635bff',
    violet: '#7c3aed',
    emerald: '#059669',
    teal: '#14b8a6',
    rose: '#f43f5e',
    gray: '#5a6080',
    border: 'rgba(255,255,255,0.08)'
};

function setDefaultDates() {
    const today = new Date();
    const lastMonth = new Date();
    lastMonth.setDate(today.getDate() - 30);
    
    document.getElementById("endDate").value = today.toISOString().split('T')[0];
    document.getElementById("startDate").value = lastMonth.toISOString().split('T')[0];
}

function fetchAnalytics() {
    const sDate = document.getElementById("startDate").value;
    const eDate = document.getElementById("endDate").value;
    
    let url = API + "/api/requests";
    if (sDate && eDate) {
        url = API + `/api/requests/analytics?from=${sDate}T00:00:00&to=${eDate}T23:59:59`;
    }
    
    fetch(url)
    .then(r => r.json())
    .then(data => {
        allReqs = data;
        processData(data);
    })
    .catch(() => alert("Failed to fetch analytics data."));
}

function processData(data) {
    let pending = 0, accepted = 0, completed = 0;
    let issues = {};
    
    data.forEach(r => {
        if (r.status === "Pending") pending++;
        else if (r.status === "Accepted") accepted++;
        else if (r.status === "Completed") completed++;
        
        let type = r.issue || "Unknown";
        issues[type] = (issues[type] || 0) + 1;
    });
    
    document.getElementById("sTotal").innerText = data.length;
    document.getElementById("sPending").innerText = pending;
    document.getElementById("sAccepted").innerText = accepted;
    document.getElementById("sCompleted").innerText = completed;
    
    renderStatusChart(pending, accepted, completed);
    renderIssueChart(issues);
}

function renderStatusChart(p, a, c) {
    const ctx = document.getElementById('statusChart').getContext('2d');
    if (statusChart) statusChart.destroy();
    
    statusChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Pending', 'Accepted', 'Completed'],
            datasets: [{
                data: [p, a, c],
                backgroundColor: [colors.warning, colors.info, colors.success],
                borderWidth: 0,
                hoverOffset: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '75%',
            plugins: {
                legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, pointStyle: 'circle' } }
            }
        }
    });
}

function renderIssueChart(issuesMap) {
    const ctx = document.getElementById('issueChart').getContext('2d');
    if (issueChart) issueChart.destroy();
    
    const labels = Object.keys(issuesMap);
    const data = Object.values(issuesMap);
    
    // Generate a palette
    const bgColors = [colors.primary, colors.violet, colors.info, colors.teal, colors.emerald, colors.warning, colors.rose, colors.gray];
    const datasetColors = labels.map((_, i) => bgColors[i % bgColors.length]);
    
    issueChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Number of Requests',
                data: data,
                backgroundColor: datasetColors,
                borderRadius: 6,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: colors.border }, ticks: { stepSize: 1 } },
                x: { grid: { display: false } }
            }
        }
    });
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    const sDate = document.getElementById("startDate").value;
    const eDate = document.getElementById("endDate").value;
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.text("Sahay - Analytics Report", 14, 22);
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Period: ${sDate || 'All Time'} to ${eDate || 'All Time'}`, 14, 32);
    
    const t = document.getElementById("sTotal").innerText;
    const p = document.getElementById("sPending").innerText;
    const a = document.getElementById("sAccepted").innerText;
    const c = document.getElementById("sCompleted").innerText;
    
    doc.text(`Total Requests: ${t}    Pending: ${p}    Accepted: ${a}    Completed: ${c}`, 14, 42);
    
    let tableData = allReqs.map(r => [
        r.id,
        r.customerName,
        r.vehicleNumber,
        r.issue,
        r.status,
        r.createdAt ? r.createdAt.substring(0, 10) : 'N/A'
    ]);
    
    doc.autoTable({
        startY: 50,
        head: [['ID', 'Customer', 'Vehicle', 'Issue', 'Status', 'Date']],
        body: tableData,
        theme: 'striped',
        headStyles: { fillColor: [99, 91, 255] } // Stripe Purple
    });
    
    doc.save("Sahay_Analytics_Report.pdf");
}

function goToRequests() { window.location.href = "admin.html"; }
function goToShops() { window.location.href = "shops.html"; }
function logout() { localStorage.clear(); window.location.href = "index.html"; }

setDefaultDates();
fetchAnalytics();
