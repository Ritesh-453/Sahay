<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sevak — Roadside Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #06070f;
  --bg-deep: #0a0c1a;
  --bg-dark: #0a0c1a;
  --bg-card: #0f1120;
  --bg-surface: #141729;
  --bg-raised: #1a1f35;

  --stripe-purple: #635bff;
  --stripe-purple-bright: #7c74ff;
  --stripe-violet: #7c3aed;
  --stripe-glow: rgba(99,91,255,0.18);

  --primary: #635bff;
  --primary-hover: #7c74ff;
  --primary-light: rgba(99,91,255,0.15);

  --text-main: #eef0ff;
  --text-secondary: #a8b0d8;
  --text-muted: #5a6080;
  --border: rgba(255,255,255,0.08);
  --border-accent: rgba(99,91,255,0.4);

  --success: #10b981;
  --error: #f43f5e;
  --warning: #f59e0b;
  --info: #06b6d4;

  --font: 'Sora', sans-serif;
  --font-body: 'DM Sans', sans-serif;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-void);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Navbar ── */
.navbar {
  background: rgba(6,7,15,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 0 32px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-main);
  display: flex;
  align-items: center;
  gap: 12px;
  letter-spacing: -0.5px;
  text-decoration: none;
}

.brand-mark {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

.nav-right {
  display: flex; align-items: center; gap: 20px;
}

.btn-back {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.btn-back:hover { background: var(--bg-raised); color: var(--text-main); }

/* ── Layout ── */
.page-wrap {
  flex: 1;
  display: grid;
  grid-template-columns: 300px 1fr;
  height: calc(100vh - 70px);
  overflow: hidden;
}

/* ── Sidebar / Categories ── */
.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-title {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.search-box {
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-main);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 9px 12px 9px 34px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box input:focus { border-color: var(--stripe-purple); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none;
}

.category-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
}
.category-list::-webkit-scrollbar { width: 4px; }
.category-list::-webkit-scrollbar-track { background: transparent; }
.category-list::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

.cat-group-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px 20px 4px;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s;
  font-size: 13.5px;
  color: var(--text-secondary);
  border-left: 2px solid transparent;
}
.cat-item:hover { background: var(--bg-surface); color: var(--text-main); }
.cat-item.active {
  background: var(--primary-light);
  color: var(--stripe-purple-bright);
  border-left-color: var(--stripe-purple);
}
.cat-icon { font-size: 16px; width: 20px; text-align: center; }

/* ── Chat Area ── */
.chat-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-void);
}

/* ── Welcome screen ── */
.welcome-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
  gap: 20px;
}
.welcome-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet));
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 0 40px rgba(99,91,255,0.3);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.welcome-title {
  font-family: var(--font);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.welcome-title span { color: var(--stripe-purple-bright); }
.welcome-sub {
  font-size: 15px;
  color: var(--text-muted);
  max-width: 420px;
  line-height: 1.6;
}

.quick-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  max-width: 540px;
  width: 100%;
  margin-top: 10px;
}
.quick-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  font-size: 13px;
  color: var(--text-secondary);
}
.quick-card:hover {
  border-color: var(--border-accent);
  background: var(--bg-surface);
  color: var(--text-main);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(99,91,255,0.12);
}
.quick-card .qc-icon { font-size: 24px; margin-bottom: 8px; display: block; }
.quick-card .qc-label { font-size: 12px; font-weight: 500; line-height: 1.3; }

/* ── Chat conversation ── */
.chat-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  display: flex;
  align-items: center;
  gap: 14px;
}
.chat-header-icon {
  width: 40px; height: 40px;
  background: var(--primary-light);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  border: 1px solid var(--border-accent);
}
.chat-header-text h3 {
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
}
.chat-header-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.btn-home {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s;
}
.btn-home:hover { background: var(--bg-raised); color: var(--text-main); }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

/* Bot message */
.msg {
  display: flex;
  gap: 12px;
  max-width: 82%;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; margin-left: auto; }
.msg-avatar {
  width: 36px; height: 36px; min-width: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--stripe-purple), var(--stripe-violet));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.msg.user .msg-avatar {
  background: var(--bg-raised);
  border: 1px solid var(--border);
}
.msg-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-main);
}
.msg.user .msg-bubble {
  background: var(--primary-light);
  border-color: var(--border-accent);
  border-radius: 14px 4px 14px 14px;
  color: var(--text-main);
}

/* Step buttons inside bot bubble */
.step-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}
.step-btn {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  padding: 9px 14px;
  text-align: left;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.step-btn:hover { background: var(--primary-light); border-color: var(--border-accent); color: var(--text-main); }
.step-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Solution steps */
.solution-steps {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sol-step {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 8px 10px;
  background: rgba(99,91,255,0.07);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--stripe-purple);
}
.sol-num {
  min-width: 22px; height: 22px;
  background: var(--stripe-purple);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}
.sol-text { font-size: 13px; line-height: 1.5; color: var(--text-secondary); }

/* Helpline cards */
.helpline-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}
.helpline-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.helpline-icon { font-size: 22px; }
.helpline-info { flex: 1; }
.helpline-name { font-size: 13px; font-weight: 600; color: var(--text-main); }
.helpline-num { font-size: 14px; font-weight: 700; color: var(--stripe-purple-bright); margin-top: 2px; }
.helpline-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.call-btn {
  background: var(--primary-light);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-sm);
  color: var(--stripe-purple-bright);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  cursor: pointer;
  font-family: var(--font-body);
  text-decoration: none;
  display: flex; align-items: center; gap: 4px;
}
.call-btn:hover { background: var(--stripe-purple); color: #fff; }

/* Input bar */
.input-bar {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
  display: flex;
  gap: 10px;
  align-items: center;
}
.input-bar input {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-main);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 11px 16px;
  outline: none;
  transition: border-color 0.2s;
}
.input-bar input::placeholder { color: var(--text-muted); }
.input-bar input:focus { border-color: var(--stripe-purple); }
.send-btn {
  width: 42px; height: 42px;
  background: var(--stripe-purple);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s;
}
.send-btn:hover { background: var(--stripe-purple-bright); }
.send-btn:active { transform: scale(0.95); }

/* Offline badge */
.offline-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(16,185,129,0.12);
  border: 1px solid rgba(16,185,129,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--success);
  font-weight: 600;
}
.offline-dot {
  width: 6px; height: 6px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Typing indicator */
.typing-indicator {
  display: flex; gap: 4px; align-items: center; padding: 4px 0;
}
.typing-dot {
  width: 7px; height: 7px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* Feedback row */
.feedback-row {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  align-items: center;
}
.feedback-label { font-size: 12px; color: var(--text-muted); }
.fb-btn {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  color: var(--text-secondary);
  transition: all 0.2s;
}
.fb-btn:hover { background: var(--primary-light); border-color: var(--border-accent); color: var(--text-main); }

/* Responsive */
@media (max-width: 700px) {
  .page-wrap { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .quick-grid { grid-template-columns: repeat(2,1fr); }
}

/* no-result */
.no-result {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.7;
}
.no-result .nr-icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>

// ════════════════════════════════════════════════════════
// FLATTEN ALL PROBLEMS
// ════════════════════════════════════════════════════════
const allProblems = [];
KB.categories.forEach(cat => {
  cat.problems.forEach(p => allProblems.push({ ...p, catIcon: cat.icon }));
});

// ════════════════════════════════════════════════════════
// RENDER SIDEBAR
// ════════════════════════════════════════════════════════
function renderSidebar(filter = '') {
  const list = document.getElementById('categoryList');
  list.innerHTML = '';
  const lf = filter.toLowerCase();

  KB.categories.forEach(cat => {
    const matchingProblems = cat.problems.filter(p =>
      !lf ||
      p.title.toLowerCase().includes(lf) ||
      (p.tags || []).some(t => t.includes(lf))
    );
    if (!matchingProblems.length) return;

    const label = document.createElement('div');
    label.className = 'cat-group-label';
    label.textContent = cat.label;
    list.appendChild(label);

    matchingProblems.forEach(p => {
      const item = document.createElement('div');
      item.className = 'cat-item';
      item.id = 'cat_' + p.id;
      item.innerHTML = `<span class="cat-icon">${p.icon}</span>${p.title}`;
      item.onclick = () => openProblem(p.id);
      list.appendChild(item);
    });
  });

  if (!list.children.length) {
    list.innerHTML = `<div class="no-result"><div class="nr-icon">🔍</div>No results for "<b>${filter}</b>"</div>`;
  }
}

function filterSidebar(val) { renderSidebar(val); }

// ════════════════════════════════════════════════════════
// RENDER QUICK GRID
// ════════════════════════════════════════════════════════
function renderQuickGrid() {
  const grid = document.getElementById('quickGrid');
  const highlights = [
    'tyre_puncture','fuel_empty','battery_dead','engine_overheat',
    'brake_fail','car_fire','highway_accident','all_helplines','key_locked_in'
  ];
  highlights.forEach(id => {
    const p = allProblems.find(x => x.id === id);
    if (!p) return;
    const card = document.createElement('div');
    card.className = 'quick-card';
    card.innerHTML = `<span class="qc-icon">${p.icon}</span><span class="qc-label">${p.title}</span>`;
    card.onclick = () => openProblem(p.id);
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════
// SHOW / HIDE SCREENS
// ════════════════════════════════════════════════════════
function showWelcome() {
  document.getElementById('welcomeScreen').style.display = '';
  document.getElementById('chatScreen').style.display = 'none';
  document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
}

function showChat() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = '';
}

// ════════════════════════════════════════════════════════
// OPEN A PROBLEM
// ════════════════════════════════════════════════════════
function openProblem(problemId) {
  const p = allProblems.find(x => x.id === problemId);
  if (!p) return;

  // Sidebar highlight
  document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
  const catEl = document.getElementById('cat_' + problemId);
  if (catEl) catEl.classList.add('active');

  // Update header
  document.getElementById('chatHeaderIcon').textContent = p.icon;
  document.getElementById('chatHeaderTitle').textContent = p.title;
  document.getElementById('chatHeaderSub').textContent = 'Sevak is guiding you';

  showChat();

  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';

  // Bot intro message
  addBotMessage(buildSolutionHTML(p));
  msgs.scrollTop = msgs.scrollHeight;
}

// ════════════════════════════════════════════════════════
// BUILD SOLUTION HTML
// ════════════════════════════════════════════════════════
function buildSolutionHTML(p) {
  let html = `<div style="font-size:15px; font-weight:600; margin-bottom:8px;">${p.icon} ${p.title}</div>`;
  html += `<div style="font-size:13.5px; color:var(--text-secondary); line-height:1.6; margin-bottom:12px;">${p.intro}</div>`;

  if (p.steps && p.steps.length) {
    html += `<div style="font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px;">Steps to Follow</div>`;
    html += `<div class="solution-steps">`;
    p.steps.forEach((s, i) => {
      html += `<div class="sol-step">
        <div class="sol-num">${i+1}</div>
        <div class="sol-text">${s}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (p.helplines && p.helplines.length) {
    html += `<div style="font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:16px; margin-bottom:8px;">📞 Emergency Numbers</div>`;
    html += `<div class="helpline-grid">`;
    p.helplines.forEach(h => {
      html += `<div class="helpline-card">
        <div class="helpline-icon">${h.icon}</div>
        <div class="helpline-info">
          <div class="helpline-name">${h.name}</div>
          <div class="helpline-num">${h.num}</div>
          <div class="helpline-desc">${h.desc}</div>
        </div>
        <a href="tel:${h.num}" class="call-btn">📞 Call</a>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="feedback-row">
    <span class="feedback-label">Was this helpful?</span>
    <button class="fb-btn" onclick="this.textContent='👍 Thanks!'; this.style.color='var(--success)'">👍 Yes</button>
    <button class="fb-btn" onclick="showRelated()">🔄 See Related</button>
  </div>`;

  return html;
}

// ════════════════════════════════════════════════════════
// CHAT MESSAGING
// ════════════════════════════════════════════════════════
function addBotMessage(htmlContent) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble">${htmlContent}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">👤</div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════════════════════
// SEND MESSAGE (SEARCH)
// ════════════════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // If not in chat screen, switch to it
  showChat();
  document.getElementById('chatHeaderIcon').textContent = '🔍';
  document.getElementById('chatHeaderTitle').textContent = 'Search Results';
  document.getElementById('chatHeaderSub').textContent = 'Sevak found these matches';

  addUserMessage(text);
  addTyping();

  setTimeout(() => {
    removeTyping();
    const lq = text.toLowerCase();
    const matches = allProblems.filter(p =>
      p.title.toLowerCase().includes(lq) ||
      (p.tags || []).some(t => t.includes(lq)) ||
      p.intro.toLowerCase().includes(lq)
    );

    if (matches.length === 0) {
      addBotMessage(`
        <div style="font-size:14px;">I couldn't find an exact match for "<b>${escHtml(text)}</b>".</div>
        <div style="font-size:13px; color:var(--text-muted); margin-top:8px; line-height:1.6;">Try different keywords like "flat tyre", "fuel empty", "engine hot", "battery dead", or browse categories on the left.</div>
        <div class="step-buttons" style="margin-top:12px;">
          <button class="step-btn" onclick="openProblem('all_helplines')">📞 View all emergency helplines</button>
          <button class="step-btn" onclick="showWelcome()">🏠 Browse all topics</button>
        </div>
      `);
    } else if (matches.length === 1) {
      openProblem(matches[0].id);
    } else {
      let html = `<div style="font-size:14px; margin-bottom:12px;">Found <b>${matches.length}</b> results for "<b>${escHtml(text)}</b>" — which one?</div>`;
      html += `<div class="step-buttons">`;
      matches.slice(0, 6).forEach(m => {
        html += `<button class="step-btn" onclick="openProblem('${m.id}')">${m.icon} ${m.title}</button>`;
      });
      html += `</div>`;
      addBotMessage(html);
    }
  }, 600);
}

// ════════════════════════════════════════════════════════
// SHOW RELATED
// ════════════════════════════════════════════════════════
function showRelated() {
  const sample = allProblems.filter(p => p.id !== 'all_helplines').sort(() => Math.random() - 0.5).slice(0, 4);
  let html = `<div style="font-size:14px; margin-bottom:10px;">You might also need:</div><div class="step-buttons">`;
  sample.forEach(p => {
    html += `<button class="step-btn" onclick="openProblem('${p.id}')">${p.icon} ${p.title}</button>`;
  });
  html += `</div>`;
  addBotMessage(html);
}
