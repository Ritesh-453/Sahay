<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahay — Manage Shops</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root {
            --bg-void: #06070f;
            --bg-deep: #0a0c1a;
            --bg-dark: #0a0c1a;
            --bg-card: #0f1120;
            --bg-surface: #141729;
            --bg-raised: #1a1f35;

            --stripe-purple: #635bff;
            --stripe-purple-bright: #7c74ff;
            --stripe-violet: #7c3aed;
            --stripe-glow: rgba(99,91,255,0.18);

            --primary: #635bff;
            --primary-hover: #7c74ff;
            --primary-light: rgba(99,91,255,0.15);

            --text-main: #eef0ff;
            --text-secondary: #a8b0d8;
            --text-muted: #5a6080;
            --border: rgba(255,255,255,0.08);
            --border-accent: rgba(99,91,255,0.4);

            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
            --info: #06b6d4;

            --font: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg-void);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Nav */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            box-shadow: 4px 0 24px rgba(0,0,0,0.3);
        }

        .brand-area {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .brand-mark { width:44px; height:44px; display:flex; align-items:center; }

        .brand-text { font-family: Arial, sans-serif; font-weight: 900; font-size: 28px; color: #ff6600; letter-spacing: -0.5px; }

        .nav-links {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(99,91,255,0.2), rgba(124,58,237,0.15));
            color: var(--stripe-purple-bright);
            border: 1px solid rgba(99,91,255,0.25);
        }
        .nav-link:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text-main); }
        .nav-link-icon { font-size: 18px; }

        .nav-footer {
            padding: 24px 16px;
            border-top: 1px solid var(--border);
        }

        .btn-logout {
            width: 100%; display: flex; align-items: center; justify-content: center;
            gap: 8px; background: rgba(244,63,94,0.08); color: var(--error);
            border: 1px solid rgba(244,63,94,0.25); padding: 10px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: var(--font);
        }
        .btn-logout:hover { background: rgba(244,63,94,0.15); border-color: rgba(244,63,94,0.4); }

        /* Main Content */
        .main-content {
            flex: 1; margin-left: 260px; padding: 32px; max-width: 1200px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 32px; max-width: 600px;
        }

        .stat-card {
            background: var(--bg-card); border-radius: var(--radius-md); padding: 24px;
            border: 1px solid var(--border); display: flex; align-items: center;
            gap: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.25);
            transition: all 0.25s ease; position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--stripe-purple), transparent); opacity: 0.5;
        }
        .stat-card:hover { border-color: var(--border-accent); box-shadow: 0 6px 30px rgba(99,91,255,0.15); transform: translateY(-2px); }

        .stat-icon {
            width: 48px; height: 48px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
        }

        .stat-icon.total { background: rgba(99,91,255,0.15); color: var(--stripe-purple-bright); border: 1px solid rgba(99,91,255,0.25); }
        .stat-icon.branches { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }

        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; font-family: var(--font); }
        .stat-value { font-size: 28px; color: var(--text-main); font-weight: 700; line-height: 1; font-family: var(--font); }

        /* Controls Area */
        .controls-area {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
        }

        .section-header { display: flex; align-items: center; gap: 16px; }
        .section-header h2 { font-size: 20px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; font-family: var(--font); }

        .search-box {
            display: flex; align-items: center; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 16px;
            width: 300px; transition: all 0.2s;
        }
        .search-box:focus-within { border-color: var(--stripe-purple); box-shadow: 0 0 0 3px rgba(99,91,255,0.12); }
        .search-icon { color: var(--text-muted); font-size: 16px; margin-right: 8px; }
        .search-box input {
            background: transparent; border: none; color: var(--text-main);
            padding: 12px 0; width: 100%; font-family: var(--font-body); outline: none; font-size: 14px;
        }

        /* Table Card */
        .card {
            background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3); overflow: hidden;
        }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; min-width: 1000px; border-collapse: separate; border-spacing: 0; }
        thead th {
            padding: 16px; text-align: left; font-size: 11px; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
            background: var(--bg-dark); border-bottom: 1px solid var(--border);
        }
        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: rgba(99,91,255,0.04); }
        tbody td {
            padding: 16px; font-size: 13px; color: var(--text-main);
            border-bottom: 1px solid var(--border); white-space: nowrap;
        }
        tbody tr:last-child td { border-bottom: none; }
        .id-col { color: var(--text-muted); font-size: 12px; }
        .strong-text { font-weight: 600; }

        /* Action Buttons & Status */
        .btn-view-branches {
            background: rgba(99,91,255,0.1); color: var(--stripe-purple-bright);
            border: 1px solid rgba(99,91,255,0.3); padding: 6px 12px;
            border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: var(--font);
        }
        .btn-view-branches:hover { background: rgba(99,91,255,0.2); border-color: var(--border-accent); }

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }

        .s-open { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .s-open::before { background: var(--success); animation: pulse-dot 2s infinite; }
        .s-open:hover { background: rgba(16, 185, 129, 0.2); }

        .s-closed { background: rgba(244,63,94,0.08); color: var(--error); border: 1px solid rgba(244,63,94,0.25); }
        .s-closed::before { background: var(--error); }
        .s-closed:hover { background: rgba(244,63,94,0.15); }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Modals */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6,7,15,0.85); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: center; padding: 16px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.2s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-base {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,91,255,0.1);
            width: 100%; max-width: 600px; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column;
        }
        
        .modal-head {
            background: var(--bg-dark); padding: 20px 24px; display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
        }
        .modal-head h3 { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .btn-x {
            background: rgba(255, 255, 255, 0.05); border: none; color: var(--text-muted);
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px;
        }
        .btn-x:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        
        .modal-body { padding: 0; overflow-y: auto; }

        .branch-item {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
        }
        .branch-item:last-child { border-bottom: none; }
        .branch-name { font-size: 15px; font-weight: 600; color: var(--text-main); margin-bottom: 6px; }
        .branch-addr { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
        .branch-map { height: 180px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-void); }

        @media(max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; padding: 20px; }
            .controls-area { flex-direction: column; align-items: flex-start; gap: 16px; }
            .search-box { width: 100%; }
        }
    </style>
</head>

                        <th>Branches</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>

<div class="overlay" id="branchOverlay">
    <div class="modal-base">
        <div class="modal-head">
            <h3>Branch Locations</h3>
            <button class="btn-x" onclick="closePopup()">✕</button>
        </div>
        <div class="modal-body" id="bList">
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const API = "http://localhost:8082";
const role = localStorage.getItem("role");
if (!role || role !== "ADMIN") { alert("Access denied!"); window.location.href = "index.html"; }

let allShops = [];
let mapInstances = [];

function fetchShops() {
    fetch(API + "/api/shop/all")
    .then(r => r.json())
    .then(data => {
        allShops = data;
        let tBranches = 0;
        data.forEach(s => {
            if (s.branchesJson) {
                try { tBranches += JSON.parse(s.branchesJson).length; } catch(e){}
            }
        });
        document.getElementById("s-total").innerText = data.length;
        document.getElementById("s-branches").innerText = tBranches;
        renderTable(data);
    })
    .catch(() => alert("Failed to fetch shops."));
}

function renderTable(shops) {
    const tbody = document.querySelector("#shopsTable tbody");
    tbody.innerHTML = "";
    if (shops.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:40px">No shops found.</td></tr>';
        return;
    }
    
    shops.forEach(s => {
        let bCount = 0;
        if (s.branchesJson) {
            try { bCount = JSON.parse(s.branchesJson).length; } catch(e){}
        }

        const isClosed = s.isClosed === true;
        const statusHtml = isClosed 
            ? `<div class="status-badge s-closed" onclick="toggleStatus(${s.id}, true)" title="Click to mark as Open">Closed</div>`
            : `<div class="status-badge s-open" onclick="toggleStatus(${s.id}, false)" title="Click to mark as Closed">Open</div>`;

        const timings = (s.openingTime || '--:--') + " to " + (s.closingTime || '--:--');
        const bBtn = bCount > 0 
            ? `<button class="btn-view-branches" onclick="viewBranches(${s.id})">View ${bCount} branch(es)</button>` 
            : '<span style="color:var(--border)">No branches</span>';

        tbody.innerHTML += `<tr>
            <td class="id-col">@${s.username}</td>
            <td class="strong-text">${s.shopName}</td>
            <td>${s.ownerName || '-'}</td>
            <td>${s.phone || '-'}</td>
            <td>${s.email || '-'}</td>
            <td>${timings}</td>
            <td>${statusHtml}</td>
            <td>${bBtn}</td>
        </tr>`;
    });
}

function toggleStatus(shopId, currentlyClosed) {
    const newStatus = !currentlyClosed;
    const action = newStatus ? "close" : "open";
    if(!confirm(`Are you sure you want to mark this shop as ${action}?`)) return;

    fetch(API + `/api/shop/${shopId}/status?isClosed=${newStatus}`, { method: 'PUT' })
    .then(r => { if(!r.ok) throw new Error(); fetchShops(); })
    .catch(() => alert('Failed to update status.'));
}

function filterShops() {
    const q = document.getElementById("searchBox").value.toLowerCase();
    const f = allShops.filter(s => 
        s.shopName.toLowerCase().includes(q) || 
        s.username.toLowerCase().includes(q) || 
        (s.ownerName && s.ownerName.toLowerCase().includes(q))
    );
    renderTable(f);
}

function viewBranches(shopId) {
    mapInstances.forEach(m => m.remove());
    mapInstances = [];
    
    const shop = allShops.find(s => s.id === shopId);
    if (!shop || !shop.branchesJson) return;
    
    let branches = [];
    try { branches = JSON.parse(shop.branchesJson); } catch(e){}
    if (branches.length === 0) return;
    
    const bList = document.getElementById("bList");
    bList.innerHTML = "";
    
    branches.forEach((b, idx) => {
        const mapId = 'bmap_' + idx;
        const addr = b.address ? b.address : "No address provided";
        bList.innerHTML += `
            <div class="branch-item">
                <div class="branch-name">${b.name}</div>
                <div class="branch-addr">📍 ${addr}</div>
                <div id="${mapId}" class="branch-map" style="display:${(b.lat && b.lng) ? 'block' : 'none'}"></div>
            </div>
        `;
    });
    
    document.getElementById("branchOverlay").classList.add("show");
    
    setTimeout(() => {
        branches.forEach((b, idx) => {
            if (b.lat && b.lng) {
                const la = parseFloat(b.lat), ln = parseFloat(b.lng);
                const m = L.map('bmap_' + idx).setView([la, ln], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(m);
                L.marker([la, ln]).addTo(m).bindPopup(b.name).openPopup();
                mapInstances.push(m);
            }
        });
    }, 150);
}

function closePopup() {
    document.getElementById("branchOverlay").classList.remove("show");
    mapInstances.forEach(m => m.remove());
    mapInstances = [];
}

function goToRequests() { window.location.href = "admin.html"; }
function goToAnalytics() { window.location.href = "analytics.html"; }
function logout() { localStorage.clear(); window.location.href = "index.html"; }

fetchShops();
</script>
</body>
</html>
